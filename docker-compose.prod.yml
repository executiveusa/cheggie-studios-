version: '3.8'

# Cheggie Studios — Production Docker Compose Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Key differences from dev:
#   - No postgres/redis port exposure (internal network only)
#   - restart: unless-stopped on all services
#   - Resource limits (memory + CPU)
#   - Healthchecks on all services
#   - NGINX reverse proxy with SSL termination
#   - Production env vars loaded from .env.prod

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DOCKER_BUILD=true
    container_name: cheggie-app
    env_file: .env.prod
    environment:
      - NODE_ENV=production
    ports: []  # No direct exposure — NGINX handles all inbound traffic
    expose:
      - '3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /opt/cheggie-studios/uploads:/app/uploads
    networks:
      - cheggie
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 512m
          cpus: '0.25'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'
        max-file: '5'

  postgres:
    image: postgres:16-alpine
    container_name: cheggie-postgres
    env_file: .env.prod
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    # No ports exposed — accessible only within Docker network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # pg_hba.conf and postgresql.conf overrides can be mounted here
      # - ./ops/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
    networks:
      - cheggie
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.1'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: 'json-file'
      options:
        max-size: '20m'
        max-file: '3'

  redis:
    image: redis:7-alpine
    container_name: cheggie-redis
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
      --bind 0.0.0.0
      --protected-mode no
    env_file: .env.prod
    # No ports exposed — accessible only within Docker network
    volumes:
      - redis_data:/data
    networks:
      - cheggie
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 128m
          cpus: '0.05'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '$$REDIS_PASSWORD', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  worker-transcript:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DOCKER_BUILD=true
    container_name: cheggie-worker-transcript
    command: node workers/transcript.worker.js
    env_file: .env.prod
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /opt/cheggie-studios/uploads:/app/uploads
    networks:
      - cheggie
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'
        reservations:
          memory: 512m
          cpus: '0.25'
    healthcheck:
      test: ['CMD-SHELL', 'node -e "process.exit(0)" || exit 1']
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '5'

  worker-subtitle:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DOCKER_BUILD=true
    container_name: cheggie-worker-subtitle
    command: node workers/subtitle.worker.js
    env_file: .env.prod
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cheggie
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 128m
          cpus: '0.05'
    healthcheck:
      test: ['CMD-SHELL', 'node -e "process.exit(0)" || exit 1']
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'
        max-file: '5'

  worker-export:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DOCKER_BUILD=true
    container_name: cheggie-worker-export
    command: node workers/export.worker.js
    env_file: .env.prod
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /opt/cheggie-studios/uploads:/app/uploads
    networks:
      - cheggie
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.1'
    healthcheck:
      test: ['CMD-SHELL', 'node -e "process.exit(0)" || exit 1']
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'
        max-file: '5'

  worker-search:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DOCKER_BUILD=true
    container_name: cheggie-worker-search
    command: node workers/search.worker.js
    env_file: .env.prod
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cheggie
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 128m
          cpus: '0.05'
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'
        max-file: '5'

  # NGINX reverse proxy — handles SSL termination, static caching, rate limiting
  nginx:
    image: nginx:1.27-alpine
    container_name: cheggie-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./ops/nginx/cheggie-studios.conf:/etc/nginx/conf.d/cheggie-studios.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /opt/cheggie-studios/uploads:/var/www/uploads:ro
      # NGINX logs
      - /var/log/nginx:/var/log/nginx
      # ACME challenge for Certbot renewal
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - cheggie
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
        reservations:
          memory: 64m
          cpus: '0.05'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'
        max-file: '10'

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  cheggie:
    driver: bridge
