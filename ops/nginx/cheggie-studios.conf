# =============================================================================
# Cheggie Studios — NGINX Production Configuration
# Domain: cheggiestudios.com
# App backend: http://app:3000 (Docker internal network)
#
# Features:
#   - HTTPS with Let's Encrypt (Certbot)
#   - www → non-www redirect
#   - HTTP → HTTPS redirect
#   - WebSocket support (for real-time features)
#   - Gzip compression
#   - Aggressive caching for static Next.js assets
#   - Upload body size limit: 550MB
#   - Rate limiting: general + strict auth zones
#   - Security headers (HSTS, X-Frame-Options, X-Content-Type-Options)
#   - Health check endpoint bypass (no rate limit, no auth)
# =============================================================================

# ---------------------------------------------------------------------------
# Rate limiting zones
# Defined in http context — these are referenced in server/location blocks.
# ---------------------------------------------------------------------------

# General zone: 10 req/s per IP (burst 20 with no-delay for static assets)
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

# Auth zone: 5 req/min per IP — strict limit for login/signup endpoints
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# Upload zone: 2 req/min per IP — prevent upload abuse
limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/m;

# ---------------------------------------------------------------------------
# Upstream definition
# ---------------------------------------------------------------------------
upstream cheggie_app {
    server app:3000;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect (catches both www and non-www)
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name cheggiestudios.com www.cheggiestudios.com;

    # ACME challenge for Certbot certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://cheggiestudios.com$request_uri;
    }
}

# ---------------------------------------------------------------------------
# www → non-www redirect (HTTPS)
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.cheggiestudios.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/cheggiestudios.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cheggiestudios.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://cheggiestudios.com$request_uri;
}

# ---------------------------------------------------------------------------
# Main HTTPS server block
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name cheggiestudios.com;

    # ------------------------------------------------------------------
    # SSL configuration
    # ------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/cheggiestudios.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cheggiestudios.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ------------------------------------------------------------------
    # Logging
    # ------------------------------------------------------------------
    access_log /var/log/nginx/cheggie-access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/cheggie-error.log warn;

    # ------------------------------------------------------------------
    # Request body size (video uploads up to 550MB)
    # ------------------------------------------------------------------
    client_max_body_size 550M;
    client_body_timeout  300s;
    client_header_timeout 60s;

    # ------------------------------------------------------------------
    # Gzip compression
    # Do NOT gzip video/audio — they are already compressed.
    # ------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ------------------------------------------------------------------
    # Security headers
    # (Next.js also sets most of these, but belt-and-suspenders at proxy)
    # ------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;

    # ------------------------------------------------------------------
    # Proxy common settings (reused across locations)
    # ------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_cache_bypass $http_upgrade;

    # ------------------------------------------------------------------
    # Health check — no rate limiting, no auth, direct to app
    # Used by Docker healthchecks and external uptime monitors.
    # ------------------------------------------------------------------
    location = /api/health {
        proxy_pass         http://cheggie_app;
        proxy_read_timeout 10s;
        access_log off;
    }

    # ------------------------------------------------------------------
    # Auth endpoints — strict rate limiting (5 req/min per IP)
    # ------------------------------------------------------------------
    location ~ ^/api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://cheggie_app;
        proxy_read_timeout 30s;
    }

    # ------------------------------------------------------------------
    # Upload endpoints — upload rate limiting + large body allowed
    # ------------------------------------------------------------------
    location ~ ^/api/upload {
        limit_req zone=upload burst=5 nodelay;
        limit_req_status 429;

        client_max_body_size 550M;
        client_body_timeout  600s;
        proxy_read_timeout   600s;
        proxy_send_timeout   600s;
        proxy_request_buffering off;

        proxy_pass http://cheggie_app;
    }

    # ------------------------------------------------------------------
    # API routes — general rate limiting
    # ------------------------------------------------------------------
    location /api/ {
        limit_req zone=general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://cheggie_app;
        proxy_read_timeout 60s;
    }

    # ------------------------------------------------------------------
    # Next.js static assets (/_next/static/*)
    # Served with 1-year immutable cache — Next.js uses content hashes.
    # ------------------------------------------------------------------
    location /_next/static/ {
        proxy_pass http://cheggie_app;

        # Aggressive caching — these files never change once deployed
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary "Accept-Encoding";

        # Suppress security headers for pure static assets
        add_header X-Content-Type-Options "nosniff" always;

        access_log off;
    }

    # ------------------------------------------------------------------
    # Next.js image optimization endpoint
    # ------------------------------------------------------------------
    location /_next/image {
        proxy_pass         http://cheggie_app;
        proxy_read_timeout 30s;

        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header Vary "Accept";
    }

    # ------------------------------------------------------------------
    # WebSocket support (for real-time features, future use)
    # Upgrade header must be forwarded for WS connections.
    # ------------------------------------------------------------------
    location /ws/ {
        proxy_pass http://cheggie_app;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ------------------------------------------------------------------
    # ACME challenge (Certbot renewal inside HTTPS block as fallback)
    # ------------------------------------------------------------------
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # ------------------------------------------------------------------
    # Favicon and robots.txt — no logging
    # ------------------------------------------------------------------
    location = /favicon.ico {
        proxy_pass http://cheggie_app;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        proxy_pass http://cheggie_app;
        access_log off;
        log_not_found off;
    }

    # ------------------------------------------------------------------
    # Default location — proxy everything to Next.js app
    # ------------------------------------------------------------------
    location / {
        limit_req zone=general burst=30 nodelay;
        limit_req_status 429;

        proxy_pass         http://cheggie_app;
        proxy_read_timeout 60s;

        # WebSocket upgrade passthrough (Next.js HMR / future WS pages)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ------------------------------------------------------------------
    # Custom error pages
    # ------------------------------------------------------------------
    error_page 429 /429.html;
    error_page 500 502 503 504 /50x.html;

    location = /429.html {
        return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please slow down."}';
        add_header Content-Type application/json;
        access_log off;
    }

    location = /50x.html {
        root /var/www/html;
    }
}

# ---------------------------------------------------------------------------
# Map for WebSocket connection upgrade
# ---------------------------------------------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
